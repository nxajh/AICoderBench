services:
  # 评测沙箱镜像 — 仅用于构建 aicoderbench-eval 镜像，不作为常驻服务运行
  sandbox:
    build:
      context: ./sandbox
    image: aicoderbench-eval
    command: /bin/true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./problems:/app/problems:rw
      - eval-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      # 共享宿主机路径，使 backend 容器创建的 sandbox 子目录对 Docker daemon 可见
      - /tmp/aicoderbench_eval:/tmp/aicoderbench_eval:rw
    environment:
      - DATABASE_URL=sqlite:////app/data/aicoderbench.db
      - EVAL_TMPDIR=/tmp/aicoderbench_eval
    depends_on:
      - sandbox

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  eval-data:
